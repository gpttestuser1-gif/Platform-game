name: Deploy to GitHub Pages

# Official GitHub Pages workflow using the actions/* packages
# This workflow builds the site and lets GitHub handle publishing
# from the Pages setting (here set to GitHub Actions).

on:
  push:
    branches:
      - main

permissions:
  pages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build

      - name: Upload production build
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v3
      - uses: actions/deploy-pages@v3
